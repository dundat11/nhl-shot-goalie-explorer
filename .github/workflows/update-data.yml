name: Update Shot Data

on:
  schedule:
    # Daily at 08:00 UTC, but only Oct-Apr (NHL regular season) — cron month field
    # lists the months explicitly since the Oct-Apr range wraps the year boundary.
    - cron: '0 8 * 1,2,3,4,10,11,12 *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache raw game data
        uses: actions/cache@v4
        with:
          path: data/raw
          key: raw-games-${{ github.run_id }}
          restore-keys: |
            raw-games-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch games
        run: python scripts/fetch_games.py

      - name: Fetch shots
        run: python scripts/fetch_shots.py

      - name: Fetch goalie metadata
        run: python scripts/fetch_goalie_meta.py

      - name: Process data
        run: python scripts/process_data.py

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: scheduled data refresh"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref ${{ github.ref_name }}
