<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NHL Shot Location & Goalie Tendency Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <img id="team-logo" alt="" class="team-logo" onerror="this.style.display='none'">
      <div>
        <h1 id="team-title">Loading…</h1>
        <p class="subtitle" id="team-arena"></p>
      </div>
    </div>
    <!-- Mobile menu trigger -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open options">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Backdrop for mobile sheet -->
  <div class="sheet-overlay" id="sheet-overlay"></div>

  <div class="controls" id="controls">
    <!-- Sheet header: only visible on mobile -->
    <div class="sheet-header">
      <div class="sheet-handle"></div>
      <span class="sheet-title">Options</span>
      <button class="sheet-close-btn" id="sheet-close">Done</button>
    </div>

    <div class="control-group">
      <label>Team</label>
      <select id="filter-team" class="game-select"></select>
    </div>
    <div class="control-group">
      <label>Goalie</label>
      <select id="filter-goalie" class="game-select">
        <option value="all">All goalies</option>
      </select>
    </div>

    <div class="control-group">
      <label>Shooter</label>
      <div class="btn-group" id="filter-shooter">
        <button class="btn active" data-value="all">All</button>
        <button class="btn" data-value="home">Home</button>
        <button class="btn" data-value="opponent">Opponent</button>
      </div>
    </div>
    <div class="control-group">
      <label>Season</label>
      <div class="btn-group" id="filter-season">
        <button class="btn active" data-value="all">Both</button>
        <button class="btn" data-value="20242025">2024–25</button>
        <button class="btn" data-value="20252026">2025–26</button>
      </div>
    </div>
    <div class="control-group">
      <label>View</label>
      <div class="btn-group" id="filter-view">
        <button class="btn active" data-value="heatmap">Heatmap</button>
        <button class="btn" data-value="scatter">Scatter</button>
      </div>
    </div>
    <div class="control-group">
      <label>Metric</label>
      <div class="btn-group" id="filter-metric">
        <button class="btn active" data-value="rate">Conversion Rate</button>
        <button class="btn" data-value="volume">Shot Volume</button>
      </div>
    </div>
    <div class="control-group">
      <label>Zone Analysis</label>
      <div class="btn-group" id="filter-select">
        <button class="btn active" data-value="off">Off</button>
        <button class="btn" data-value="on">Select Zones</button>
      </div>
    </div>
    <div class="control-group">
      <label>Game</label>
      <select id="filter-game" class="game-select">
        <option value="all">All home games</option>
      </select>
    </div>
    <div class="control-group">
      <label>Overlay</label>
      <div class="btn-group" id="filter-grid">
        <button class="btn active" data-value="off">Off</button>
        <button class="btn" data-value="on">Grid</button>
      </div>
    </div>
  </div>

  <div class="select-status" id="select-status">
    <strong id="select-count">0 zones selected</strong>
    <span id="select-hint">Click hexes on the map — stats will compare selected zone vs rest of ice</span>
    <button class="btn-clear" id="btn-clear-selection">Clear</button>
  </div>

  <div class="viz-wrapper">
    <div class="rink-container">
      <svg id="rink"></svg>
    </div>

    <div class="legend" id="legend">
      <div class="legend-label low">Low</div>
      <div class="legend-bar" id="legend-bar"></div>
      <div class="legend-label high">High</div>
      <div class="legend-title" id="legend-title">Conversion Rate</div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="stat-shots">—</span>
      <span class="stat-label" id="label-shots">Shots on Goal</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-goals">—</span>
      <span class="stat-label" id="label-goals">Goals</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-rate">—</span>
      <span class="stat-label" id="label-rate">Overall Rate</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-bench-rate">—</span>
      <span class="stat-label" id="label-bench-rate">Home Team Rate</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-far-rate">—</span>
      <span class="stat-label" id="label-far-rate">Opponent Rate</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-diff">—</span>
      <span class="stat-label" id="label-diff">Difference</span>
    </div>
  </div>

  <div class="build-info" id="build-info"></div>

  <div class="tooltip" id="tooltip"></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
